<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleChat</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --text: #eee;
  --text-dim: #8892b0;
  --user-bg: #0f3460;
  --bot-bg: #1a1a2e;
  --input-bg: #16213e;
  --border: #233554;
  --code-bg: #0d1b2a;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .status {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.header .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
}
.header .dot.connected { background: #4ade80; }

/* auth overlay */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.auth-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.auth-box h2 { margin-bottom: 8px; font-size: 20px; }
.auth-box p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
.auth-box input {
  width: 100%;
  padding: 12px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  margin-bottom: 12px;
}
.auth-box input:focus { border-color: var(--accent); }
.auth-box button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.auth-box .error { color: var(--accent); font-size: 13px; margin-top: 8px; }
.hidden { display: none !important; }

/* messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  scroll-behavior: smooth;
}
.msg-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 20px;
}
.msg {
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  line-height: 1.6;
}
.msg .avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  margin-top: 2px;
}
.msg.user .avatar { background: var(--user-bg); }
.msg.bot .avatar { background: var(--accent); color: #fff; }
.msg.system .avatar { background: var(--border); }

.msg .body {
  flex: 1;
  min-width: 0;
}
.msg .role {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.msg .content {
  font-size: 15px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.msg .content p { margin-bottom: 8px; }
.msg .content p:last-child { margin-bottom: 0; }
.msg .content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 13px;
  line-height: 1.5;
}
.msg .content code {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
}
.msg .content code:not(pre code) {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.msg .content ul, .msg .content ol {
  padding-left: 20px;
  margin: 8px 0;
}
.msg .content li { margin-bottom: 4px; }
.msg .content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-dim);
  margin: 8px 0;
}
.msg .content a { color: #60a5fa; }
.msg .content strong { font-weight: 600; }
.msg .content em { font-style: italic; }
.msg .content h1, .msg .content h2, .msg .content h3 {
  margin: 12px 0 6px;
  font-weight: 600;
}
.msg .content h1 { font-size: 20px; }
.msg .content h2 { font-size: 17px; }
.msg .content h3 { font-size: 15px; }

/* progress indicator */
.progress-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  padding: 4px 0;
}
.progress-indicator .spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.progress-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.tool-badge {
  font-size: 11px;
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  color: var(--text-dim);
}

/* stats */
.msg-stats {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  opacity: 0.7;
}

/* input area */
.input-area {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 16px 20px;
  flex-shrink: 0;
}
.input-wrap {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-wrap textarea {
  flex: 1;
  padding: 12px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 200px;
}
.input-wrap textarea:focus { border-color: var(--accent); }
.input-wrap textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 48px; height: 48px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.send-btn:disabled { opacity: 0.4; cursor: default; }
.send-btn svg { width: 20px; height: 20px; }

/* empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state h2 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-state p { font-size: 15px; line-height: 1.6; }
.empty-state .commands {
  margin-top: 24px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}
.empty-state .cmd {
  background: var(--surface2);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-family: monospace;
  cursor: pointer;
  transition: background 0.2s;
}
.empty-state .cmd:hover { background: var(--accent); color: #fff; }

/* scrollbar */
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* responsive */
@media (max-width: 600px) {
  .header { padding: 10px 16px; }
  .msg-wrap { padding: 0 12px; }
  .input-area { padding: 12px; }
  .msg .avatar { width: 28px; height: 28px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay hidden" id="authOverlay">
  <div class="auth-box">
    <h2>TeleChat Web</h2>
    <p>Enter your access token to continue.</p>
    <input type="password" id="authToken" placeholder="Access token" autocomplete="off">
    <button onclick="authenticate()">Connect</button>
    <div class="error hidden" id="authError">Invalid token. Try again.</div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>TeleChat</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="msg-wrap" id="msgWrap">
    <div class="empty-state" id="emptyState">
      <h2>TeleChat Web</h2>
      <p>Chat with Claude right from your browser.<br>Same engine as Telegram, WhatsApp, and Slack.</p>
      <div class="commands">
        <div class="cmd" onclick="insertCmd('/help')">/help</div>
        <div class="cmd" onclick="insertCmd('/clear')">/clear</div>
        <div class="cmd" onclick="insertCmd('/new')">/new</div>
      </div>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Message Claude…" rows="1" disabled></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
let ws = null;
let authenticated = false;
let reconnectDelay = 1000;
let currentStreamId = null;
let streamBuffer = {};

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    reconnectDelay = 1000;
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };
  ws.onclose = () => {
    setStatus(false);
    disableInput();
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
  ws.onerror = () => {};
}

function handleMessage(data) {
  switch (data.type) {
    case 'connected':
      if (data.auth_required) {
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('authToken').focus();
      } else {
        onAuthenticated();
      }
      break;
    case 'auth_ok':
      document.getElementById('authOverlay').classList.add('hidden');
      document.getElementById('authError').classList.add('hidden');
      onAuthenticated();
      break;
    case 'auth_fail':
      document.getElementById('authError').classList.remove('hidden');
      break;
    case 'thinking':
      hideEmpty();
      currentStreamId = data.msg_id;
      streamBuffer[data.msg_id] = '';
      addThinking(data.msg_id);
      break;
    case 'progress':
      updateProgress(data.msg_id, data.tool, data.detail);
      break;
    case 'stream':
      appendStream(data.msg_id, data.text);
      break;
    case 'reply':
      hideThinking(data.msg_id);
      addBotMessage(data.text, data.stats);
      currentStreamId = null;
      enableInput();
      break;
    case 'done':
      finalizeStream(data.msg_id, data.stats);
      currentStreamId = null;
      enableInput();
      break;
    case 'system':
      hideEmpty();
      addSystemMessage(data.text);
      enableInput();
      break;
    case 'error':
      hideThinking(data.msg_id);
      addSystemMessage('Error: ' + data.text);
      currentStreamId = null;
      enableInput();
      break;
  }
}

function onAuthenticated() {
  authenticated = true;
  setStatus(true);
  enableInput();
}

function setStatus(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.classList.add('connected');
    text.textContent = 'Connected';
  } else {
    dot.classList.remove('connected');
    text.textContent = 'Reconnecting…';
  }
}

function enableInput() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  input.disabled = false;
  btn.disabled = false;
  input.focus();
}
function disableInput() {
  document.getElementById('input').disabled = true;
  document.getElementById('sendBtn').disabled = true;
}

function hideEmpty() {
  const el = document.getElementById('emptyState');
  if (el) el.remove();
}

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  hideEmpty();
  if (!text.startsWith('/')) {
    addUserMessage(text);
  }
  ws.send(JSON.stringify({ type: 'message', text }));
  input.value = '';
  input.style.height = 'auto';
  if (!text.startsWith('/')) disableInput();
}

function authenticate() {
  const token = document.getElementById('authToken').value;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'auth', token }));
  }
}

// Message rendering
function addUserMessage(text) {
  const wrap = document.getElementById('msgWrap');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="avatar">U</div>
    <div class="body">
      <div class="role">You</div>
      <div class="content">${escapeHtml(text)}</div>
    </div>`;
  wrap.appendChild(el);
  scrollBottom();
}

function addBotMessage(text, stats) {
  const wrap = document.getElementById('msgWrap');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `
    <div class="avatar">C</div>
    <div class="body">
      <div class="role">Claude</div>
      <div class="content">${renderMarkdown(text)}</div>
      ${statsHtml(stats)}
    </div>`;
  wrap.appendChild(el);
  scrollBottom();
}

function addSystemMessage(text) {
  const wrap = document.getElementById('msgWrap');
  const el = document.createElement('div');
  el.className = 'msg system';
  el.innerHTML = `
    <div class="avatar">i</div>
    <div class="body">
      <div class="role">System</div>
      <div class="content">${renderMarkdown(text)}</div>
    </div>`;
  wrap.appendChild(el);
  scrollBottom();
}

function addThinking(msgId) {
  const wrap = document.getElementById('msgWrap');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.id = 'thinking-' + msgId;
  el.innerHTML = `
    <div class="avatar">C</div>
    <div class="body">
      <div class="role">Claude</div>
      <div class="progress-indicator">
        <div class="spinner"></div>
        <span>Thinking…</span>
      </div>
      <div class="progress-tools" id="tools-${msgId}"></div>
      <div class="content" id="stream-${msgId}" style="display:none"></div>
    </div>`;
  wrap.appendChild(el);
  scrollBottom();
}

function updateProgress(msgId, tool, detail) {
  const toolsEl = document.getElementById('tools-' + msgId);
  if (!toolsEl) return;
  const badge = document.createElement('span');
  badge.className = 'tool-badge';
  badge.textContent = tool + (detail ? ': ' + detail : '');
  toolsEl.appendChild(badge);

  const indicator = document.querySelector('#thinking-' + msgId + ' .progress-indicator span');
  if (indicator) indicator.textContent = 'Working…';
  scrollBottom();
}

function appendStream(msgId, text) {
  streamBuffer[msgId] = (streamBuffer[msgId] || '') + text;
  const streamEl = document.getElementById('stream-' + msgId);
  if (!streamEl) return;
  streamEl.style.display = 'block';
  streamEl.innerHTML = renderMarkdown(streamBuffer[msgId]);

  const indicator = document.querySelector('#thinking-' + msgId + ' .progress-indicator');
  if (indicator) indicator.style.display = 'none';
  scrollBottom();
}

function finalizeStream(msgId, stats) {
  const thinkEl = document.getElementById('thinking-' + msgId);
  if (!thinkEl) return;
  const indicator = thinkEl.querySelector('.progress-indicator');
  if (indicator) indicator.remove();
  const toolsEl = document.getElementById('tools-' + msgId);
  if (toolsEl) toolsEl.remove();

  const streamEl = document.getElementById('stream-' + msgId);
  if (streamEl && streamBuffer[msgId]) {
    streamEl.innerHTML = renderMarkdown(streamBuffer[msgId]);
  }

  if (stats) {
    const body = thinkEl.querySelector('.body');
    const s = document.createElement('div');
    s.className = 'msg-stats';
    s.innerHTML = statsContent(stats);
    body.appendChild(s);
  }
  delete streamBuffer[msgId];
  scrollBottom();
}

function hideThinking(msgId) {
  const el = document.getElementById('thinking-' + msgId);
  if (el) el.remove();
}

function statsHtml(stats) {
  if (!stats) return '';
  return `<div class="msg-stats">${statsContent(stats)}</div>`;
}
function statsContent(stats) {
  const parts = [];
  if (stats.input_tokens) parts.push(stats.input_tokens + ' in');
  if (stats.output_tokens) parts.push(stats.output_tokens + ' out');
  if (stats.cost_usd) parts.push('$' + stats.cost_usd.toFixed(4));
  if (stats.tools_used && stats.tools_used.length) parts.push(stats.tools_used.length + ' tools');
  return parts.join(' · ');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });
  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // unordered lists
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // paragraphs
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');

  return html;
}

function insertCmd(cmd) {
  const input = document.getElementById('input');
  input.value = cmd;
  input.focus();
}

// Auto-resize textarea
const input = document.getElementById('input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('authToken').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') authenticate();
});

connect();
</script>
</body>
</html>
